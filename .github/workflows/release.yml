name: Make release

on:
  workflow_dispatch:
    inputs:
      major:
        description: Bump major by
        required: true
        type: number
        default: 0
      minor:
        description: Bump minor by
        required: true
        type: number
        default: 0
      patch:
        description: Bump patch by
        required: true
        type: number
        default: 0

# Read-only by default so each job must explicitly request what it needs
permissions:
  contents: read

jobs:
  prepare:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    outputs:
      version: ${{ steps.version.outputs.value }}
      appimage_name: ${{ steps.version.outputs.appimage_name }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Reject no-op release
        if: inputs.major == 0 && inputs.minor == 0 && inputs.patch == 0
        run: |
          echo "All version bumps are 0, nothing to release"
          exit 1

      - name: Compute version
        id: version
        env:
          INPUT_MAJOR: ${{ inputs.major }}
          INPUT_MINOR: ${{ inputs.minor }}
          INPUT_PATCH: ${{ inputs.patch }}
        shell: bash
        run: |
          set -euo pipefail
          source settings.conf
          IFS='.' read -r current_major current_minor current_patch <<< "$release_version"
          new_major=$(( current_major + INPUT_MAJOR ))
          if [[ "$INPUT_MAJOR" -gt 0 ]]; then
            new_minor=0
            new_patch=0
          elif [[ "$INPUT_MINOR" -gt 0 ]]; then
            new_minor=$(( current_minor + INPUT_MINOR ))
            new_patch=0
          else
            new_minor=$(( current_minor + INPUT_MINOR ))
            new_patch=$(( current_patch + INPUT_PATCH ))
          fi
          version="${new_major}.${new_minor}.${new_patch}"
          if ! [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Computed version is not valid semver: $version"
            exit 1
          fi
          appimage_name="${release_name_prefix}-${version}-${release_arch}.AppImage"
          echo "value=${version}" >> "$GITHUB_OUTPUT"
          echo "appimage_name=${appimage_name}" >> "$GITHUB_OUTPUT"

  build:
    needs: prepare
    runs-on: ubuntu-24.04
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install build tools
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends file tar wget zenity zsync

      - name: Build AppImage
        env:
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          APPIMAGE_NAME: ${{ needs.prepare.outputs.appimage_name }}
          RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release
          if [[ -n "${GPG_PRIVATE_KEY:-}" ]]; then
            echo "$GPG_PRIVATE_KEY" | gpg --batch --import
            sign_key=$(gpg --list-secret-keys --with-colons \
              | awk -F: '/^fpr/{print $10; exit}')
            export SIGN_KEY="$sign_key"
            gpg --export --armor "$sign_key" > release/signing-key.asc
            printf '%s\n' "$sign_key" > release/fingerprint.txt
          fi
          export APPIMAGE_EXTRACT_AND_RUN=1
          source settings.conf
          export UPDATE_INFO="gh-releases-zsync|${REPO_OWNER}|${REPO_NAME}|latest|${release_name_prefix}-*-${release_arch}.AppImage.zsync"
          chmod +x build.sh
          ./build.sh release

      - name: Rename and verify AppImage
        shell: bash
        run: |
          set -euo pipefail
          appimage_name="${{ needs.prepare.outputs.appimage_name }}"
          mv release/UO-Outlands-x86_64.AppImage "release/${appimage_name}"
          [[ -s "release/${appimage_name}" ]]
          file "release/${appimage_name}" | grep -qiE 'AppImage|ELF'

      - name: Generate checksums and zsync
        shell: bash
        run: |
          set -euo pipefail
          appimage_name="${{ needs.prepare.outputs.appimage_name }}"
          cd release
          sha256sum "${appimage_name}" \
            | awk '{print $1 " " $2}' \
            > "${appimage_name}.sha256"
          sha256sum -c "${appimage_name}.sha256"
          zsyncmake -C \
            -u "https://github.com/${{ github.repository_owner }}/${{ github.event.repository.name }}/releases/latest/download/${appimage_name}" \
            -o "${appimage_name}.zsync" \
            "${appimage_name}"
          sha256sum "${appimage_name}.zsync" \
            | awk '{print $1 " " $2}' \
            > "${appimage_name}.zsync.sha256"

      - name: Upload AppImage
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: release-appimage
          path: |
            release/${{ needs.prepare.outputs.appimage_name }}
            release/${{ needs.prepare.outputs.appimage_name }}.sha256

      - name: Upload signing files
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: release-signing
          if-no-files-found: ignore
          path: |
            release/signing-key.asc
            release/fingerprint.txt

      - name: Upload zsync
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: release-zsync
          path: |
            release/${{ needs.prepare.outputs.appimage_name }}.zsync
            release/${{ needs.prepare.outputs.appimage_name }}.zsync.sha256

  publish:
    needs: [prepare, build]
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download artifacts
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          pattern: release-*
          merge-multiple: true

      - name: Verify checksums
        shell: bash
        run: |
          set -euo pipefail
          sha256sum -c "${{ needs.prepare.outputs.appimage_name }}.sha256"
          sha256sum -c "${{ needs.prepare.outputs.appimage_name }}.zsync.sha256"

      - name: Write release notes
        shell: bash
        run: |
          set -euo pipefail
          version="${{ needs.prepare.outputs.version }}"
          appimage_name="${{ needs.prepare.outputs.appimage_name }}"
          appimage_hash=$(cut -d' ' -f1 "${appimage_name}.sha256")
          zsync_hash=$(cut -d' ' -f1 "${appimage_name}.zsync.sha256")
          {
            printf '**SHA256** for `%s`\n```\n%s  %s\n```\n' \
              "$appimage_name" "$appimage_hash" "$appimage_name"
            printf '\n**SHA256** for `%s`\n```\n%s  %s\n```\n' \
              "${appimage_name}.zsync" "$zsync_hash" "${appimage_name}.zsync"
            if [[ -s fingerprint.txt ]]; then
              fingerprint=$(cat fingerprint.txt)
              printf '\n**GPG fingerprint:** `%s`\n' "$fingerprint"
              printf '\nThe signature is embedded in the AppImage and verified'
              printf ' automatically by AppImage installers.\n'
              printf 'Import the signing key once to enable verification:\n'
              printf '```sh\ngpg --import signing-key.asc\n```\n'
            fi
          } > release-notes.txt

      - name: Publish GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          version="${{ needs.prepare.outputs.version }}"
          appimage_name="${{ needs.prepare.outputs.appimage_name }}"
          release_files=(
            "${appimage_name}"
            "${appimage_name}.sha256"
            "${appimage_name}.zsync"
            "${appimage_name}.zsync.sha256"
          )
          [[ -f signing-key.asc ]] \
            && release_files+=("signing-key.asc")
          gh release create "${version}" \
            "${release_files[@]}" \
            --title "UO Outlands AppImage v${version}" \
            --notes-file release-notes.txt

      - name: Bump version in repository
        shell: bash
        run: |
          set -euo pipefail
          version="${{ needs.prepare.outputs.version }}"
          sed -i "s/^release_version=.*/release_version=${version}/" settings.conf
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add settings.conf
          git commit -m "Bump release version to ${version}"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push origin "HEAD:${GITHUB_REF_NAME}"

